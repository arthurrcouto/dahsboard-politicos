name: Atualizar Dados Políticos

on:
  # Roda todos os dias às 3:30 AM (horário de Brasília = 06:30 UTC)
  schedule:
    - cron: '30 6 * * *'

  # Permite rodar manualmente pelo painel do GitHub Actions
  workflow_dispatch:
    inputs:
      modo:
        description: 'Modo de coleta'
        required: true
        default: 'base'
        type: choice
        options:
          - base       # Lista de deputados + votações + senadores (~2 min)
          - completo   # Tudo + detalhe de todos os 513 deputados (~3-4h)

jobs:
  coletar:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install requests

      - name: Coletar dados base (roda todo dia automaticamente)
        if: github.event_name == 'schedule' || inputs.modo == 'base'
        run: python coletar_dados.py --lista
        env:
          PYTHONUNBUFFERED: '1'

      - name: Coletar detalhes de todos os deputados (modo completo)
        if: inputs.modo == 'completo'
        run: python coletar_dados.py --todos
        env:
          PYTHONUNBUFFERED: '1'

      - name: Commit e push dos dados atualizados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: dados atualizados $(date -u '+%d/%m/%Y %H:%M UTC')"
          git push
